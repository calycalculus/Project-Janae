<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Project Janae</title>
    <link href="../media/styles.css" rel="stylesheet">
    <link href="../media/clue_fav.PNG" type="image/x-icon" rel="icon">
</head>
<body>
    <main>
        <br>
    <header>
        <img src="../media/sa-img.png" alt="Secret Agent Icon" class="icon" width="100" height="100">
        <h1>Clue #4</h1>
    </header>
    <div class="content">
        <p>The Mafia boss must know we are after him and his crew. We need to pick up the speed. Enter your findings and head to the next crime scene.</p>
        <p>
            <input type="text" class="answer" name="answer" placeholder="Enter your answer here..." required>
            <button onclick="checkAnswer()">Submit</button>
            <div id="hint"></div>
        </p>
    </main>
</body>

<script>
    var answerList = ["testing", "Testing", "TESTING"];
    var answerInput = document.getElementsByClassName("answer")[0];
    function checkAnswer() {
        if (answerList.includes(answerInput.value)) {
            window.location.href = "clue5.html";
        } else {
            document.getElementsByClassName("answer")[0].style.borderColor = "red";
            var hintElement = document.getElementById("hint");
            hintElement.textContent = "Incorrect Answer. Try again.";
        }
    }
</script>
