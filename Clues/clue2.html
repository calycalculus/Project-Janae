<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Project Janae</title>
    <link href="../media/styles.css" rel="stylesheet">
    <link href="../media/clue_fav.PNG" type="image/x-icon" rel="icon">
</head>
<body>
    <main>
        <br>
    <header>
        <img src="../media/sa-img.png" alt="Secret Agent Icon" class="icon" width="100" height="100">
        <h1>Clue #2</h1>
    </header>
    <div class="content">
        <p>Looks like yet another misuse of the laser technology. Look for any clues and enter your findings below.</p>
        <p>
            <input type="text" id="answer" name="answer" placeholder="Enter your answer here..." required>
            <button onclick="checkAnswer()">Submit</button>
            <div id="hint"></div>
        </p>
    </div>
    </main>
</body>

<script>
    var answerList = ["123"];
    var answerInput = document.getElementById("answer");
    function checkAnswer() {
        if (answerList.includes(answerInput.value)) {
            window.location.href = "clue3.html";
        } else {
            document.getElementById("answer").style.borderColor = "red";
            var hintElement = document.getElementById("hint");
            hintElement.textContent = "Incorrect Answer. Try again.";
        }
    }
</script>
