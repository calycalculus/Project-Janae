<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Project Janae</title>
    <link href="../media/styles.css" rel="stylesheet">
    <link href="../media/clue_fav.PNG" type="image/x-icon" rel="icon">
</head>
<body>
    <main>
        <br>
    <header>
        <img src="../media/sa-img.png" alt="Secret Agent Icon" class="icon" width="100" height="100">
        <h1>Clue #3</h1>
    </header>
    <div class="content">
        <p>Well done Agent! Head to the next location and look for clues.</p>
        <p>
            <input type="text" class="answer" name="answer" placeholder="Enter your answer here..." required>
            <button onclick="checkAnswer()">Submit</button>
            <div id="hint"></div>
        </p>
    </main>
</body>

<script>
    var answer2List = ["testing", "Testing", "TESTING"];
    var answer2Input = document.getElementsByClassName("answer")[0];
    function checkAnswer() {
        if (answer2List.includes(answer2Input.value)) {
            window.location.href = "clue4.html";
        } else {
            document.getElementsByClassName("answer")[0].style.borderColor = "red";
            var hintElement = document.getElementById("hint");
            hintElement.textContent = "Incorrect Answer. Try again.";
        }
    }
</script>
